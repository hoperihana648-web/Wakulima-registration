<!DOCTYPE html>
<html>
    <head>
        <title>WAKULIMA FARMERS REGISTRATION</title>
    </head>
    <body>
        <h1>Wakulima registration</h1>
        <p>This registration form is for all farmers within the cooperative society in order to keep accurate records of their supplies.</p>
        <form>
            <fieldset>
                <legend><b>Personal information</b></legend>
                <label>First Name:</label>
                <input type="text" name="firstname"><br><br>
                <label>Surname:</label>
                <input type="text" name="surname"><br><br>
                <label>ID Number:</label>
                <input type="number" name="ID Number"><br><br>
                <label>Date of Birth:</label>
                <input type="date" name="Date of Birth"><br><br>
                <label>Telephone no:</label>
                <input type="tel" name="Telephone no"><br><br>
                <label>Gender:</label>
                <input type="radio" id="Female" name="Gender">
                <label for="Female">Female</label><br><br>
                <input type="radio" id="Male" name="Gender"
                <label for="Male">Male</label><br><br>
                <label>Passport photo:</label>
                <input type="image" name="Passport photo"><br><br>
            </fieldset>
            <br>
            <fieldset>
                <legend><b>Produce Supplied</b></legend>
                <label for="Month of Supply">Month of Supply</label><br><br>
                <select>
                    <option>May</option><br><br>
                    <option>August</option><br><br>
                    <option>December</option><br><br>
                </select>
            <label for="Produce">Produce</label>
            <input type="checkbox" id="Maize" name="Produce">
            <label for="Maize">Maize</label><br><br>
            </fieldset>
            <br>
            <input type="submit" value="submit">
            <input type="reset" value="reset">
            <h1 align="center">Gachiri Shipping Company</h1>
